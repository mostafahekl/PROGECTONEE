<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة التحكم | في الطريق</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="admin-body">
  <div class="admin-layout">

    <!-- Sidebar -->
    <aside class="admin-sidebar">
      <a href="index.html" class="logo">في الطريق</a>
      <div class="admin-nav">
        <a href="#" class="active" onclick="showDashboard()">📊 لوحة التحكم</a>
        <a href="#" onclick="showRequests()">📋 جميع الطلبات</a>
        <a href="index.html">🔙 العودة للموقع</a>
      </div>
    </aside>

    <!-- Main -->
    <main class="admin-main" id="adminMain">
      <div class="admin-header">
        <div>
          <h1>لوحة التحكم</h1>
          <p style="color:var(--text-muted);font-size:14px;">مرحباً بك في لوحة إدارة طلبات الصيانة</p>
        </div>
        <button class="btn btn-outline btn-sm" onclick="logout()">تسجيل خروج</button>
      </div>

      <!-- Stats -->
      <div class="admin-stats" id="adminStats"></div>

      <!-- Filters -->
      <div class="table-wrapper">
        <div class="table-header">
          <h3>جميع الطلبات</h3>
          <div class="table-controls">
            <input type="text" id="searchInput" placeholder="🔍 بحث..." oninput="renderTable()">
            <select id="statusFilter" onchange="renderTable()">
              <option value="all">جميع الحالات</option>
              <option value="pending">قيد الانتظار</option>
              <option value="assigned">تم التعيين</option>
              <option value="in-progress">قيد التنفيذ</option>
              <option value="completed">مكتمل</option>
              <option value="cancelled">ملغي</option>
            </select>
          </div>
        </div>
        <div class="table-wrapper" style="border:none;">
          <table>
            <thead>
              <tr>
                <th>#</th>
                <th>العميل</th>
                <th>الجوال</th>
                <th>الخدمة</th>
                <th>التاريخ</th>
                <th>الحالة</th>
                <th>الإجراءات</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

      <!-- Empty state -->
      <div id="emptyState" style="display:none;text-align:center;padding:80px 20px;color:var(--text-muted);">
        <div style="font-size:64px;margin-bottom:16px;">📭</div>
        <h3 style="margin-bottom:8px;">لا توجد طلبات</h3>
        <p>لم يتم تقديم أي طلبات صيانة بعد</p>
      </div>
    </main>
  </div>

  <!-- Detail Modal -->
  <div class="modal-overlay" id="detailModal">
    <div class="modal">
      <h2>تفاصيل الطلب</h2>
      <div id="modalBody"></div>
      <div class="modal-actions">
        <button class="btn btn-primary btn-sm" onclick="assignRequest(currentRequestId)">تعيين فني</button>
        <button class="btn btn-success btn-sm" onclick="completeRequest(currentRequestId)">تأكيد الإكمال</button>
        <button class="btn btn-danger btn-sm" onclick="cancelRequest(currentRequestId)">إلغاء</button>
        <button class="btn btn-outline btn-sm" onclick="closeModal()">إغلاق</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/main.js"></script>
  <script>
    if (!isLoggedIn()) {
      showLoginPage();
    } else {
      initializeAdmin();
    }
  </script>
</body>
</html>

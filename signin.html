<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | في الطريق</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .signin-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fef9ef 0%, #f0f9ff 100%);
      padding: 20px;
      position: relative;
      overflow: hidden;
    }
    .signin-page::before {
      content: '';
      position: absolute;
      top: -30%; left: -10%;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: rgba(245,158,11,0.06);
      filter: blur(60px);
    }
    .signin-page::after {
      content: '';
      position: absolute;
      bottom: -20%; right: -10%;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: rgba(59,130,246,0.05);
      filter: blur(50px);
    }
    .signin-card {
      background: #fff;
      border-radius: 24px;
      padding: 48px 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.08);
      position: relative;
      z-index: 1;
      animation: scaleIn 0.4s ease;
    }
    .signin-logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .signin-logo .logo {
      font-size: 28px;
      display: inline-block;
    }
    .signin-logo p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 8px;
    }
    .signin-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 28px;
      background: var(--bg-light);
      border-radius: 12px;
      padding: 4px;
    }
    .signin-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      border-radius: 10px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s;
      border: none;
      background: transparent;
      font-family: 'Cairo', sans-serif;
      color: var(--text-muted);
    }
    .signin-tab.active {
      background: #fff;
      color: var(--text-dark);
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .signin-divider {
      text-align: center;
      margin: 20px 0;
      color: var(--text-muted);
      font-size: 13px;
      position: relative;
    }
    .signin-divider::before,
    .signin-divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 45%;
      height: 1px;
      background: var(--border-color);
    }
    .signin-divider::before { right: 0; }
    .signin-divider::after { left: 0; }
    .signin-footer {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
    }
    .signin-footer a {
      color: var(--accent);
      font-weight: 600;
    }
    .signin-footer a:hover { text-decoration: underline; }
    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      font-size: 13px;
    }
    .form-options label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      cursor: pointer;
    }
    .form-options a {
      color: var(--accent);
      font-weight: 600;
    }
    .form-options a:hover { text-decoration: underline; }
    .input-icon-wrap {
      position: relative;
    }
    .input-icon-wrap .form-control {
      padding-right: 44px;
    }
    .input-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
    }
    @media (max-width: 480px) {
      .signin-card { padding: 28px 20px; }
    }
  </style>
</head>
<body>
  <div class="signin-page">
    <div class="signin-card">
      <div class="signin-logo">
        <a href="index.html" class="logo" data-key="siteName">في الطريق</a>
        <p data-key="signinSubtitle">تسجيل الدخول إلى لوحة التحكم</p>
      </div>

      <div class="signin-tabs">
        <button class="signin-tab active" onclick="switchSigninTab('admin', this)" data-key="signinAdmin">إدارة</button>
        <button class="signin-tab" onclick="switchSigninTab('tech', this)" data-key="signinTech">فني</button>
      </div>

      <!-- Admin Login -->
      <form id="adminSigninForm" onsubmit="return handleAdminSignin(event)">
        <div class="form-group">
          <label data-key="username">اسم المستخدم</label>
          <div class="input-icon-wrap">
            <span class="input-icon">👤</span>
            <input type="text" class="form-control" id="signinUser" placeholder="admin" required style="padding-right:44px;">
          </div>
        </div>
        <div class="form-group">
          <label data-key="password">كلمة المرور</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" class="form-control" id="signinPass" placeholder="••••••" required style="padding-right:44px;">
          </div>
        </div>
        <div class="form-options">
          <label><input type="checkbox" checked> <span data-key="rememberMe">تذكرني</span></label>
          <a href="#" data-key="forgotPassword">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:16px;padding:14px;" data-key="signinBtn">تسجيل الدخول</button>
      </form>

      <!-- Tech Login -->
      <form id="techSigninForm" onsubmit="return handleTechSignin(event)" style="display:none;">
        <div class="form-group">
          <label data-key="techNameLabel">اسم الفني</label>
          <div class="input-icon-wrap">
            <span class="input-icon">🔧</span>
            <input type="text" class="form-control" id="techSigninName" placeholder="أدخل اسمك" required style="padding-right:44px;">
          </div>
        </div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;font-size:16px;padding:14px;" data-key="techSigninBtn">دخول</button>
      </form>

      <div class="signin-divider" data-key="or">أو</div>

      <div class="signin-footer">
        <span data-key="noAccount">ليس لديك حساب؟</span>
        <a href="request.html" data-key="requestService">اطلب خدمة صيانة</a>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <script src="js/main.js"></script>
  <script>
    function switchSigninTab(tab, btn) {
      document.querySelectorAll('.signin-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('adminSigninForm').style.display = tab === 'admin' ? 'block' : 'none';
      document.getElementById('techSigninForm').style.display = tab === 'tech' ? 'block' : 'none';
    }

    function handleAdminSignin(e) {
      e.preventDefault();
      const user = document.getElementById('signinUser').value;
      const pass = document.getElementById('signinPass').value;
      if (user === 'admin' && pass === 'admin123') {
        localStorage.setItem('golden_team_auth', 'true');
        showToast(t('loginSuccess'));
        setTimeout(() => window.location.href = 'admin.html', 600);
      } else {
        showToast(t('loginError'), true);
      }
      return false;
    }

    function handleTechSignin(e) {
      e.preventDefault();
      const name = document.getElementById('techSigninName').value.trim();
      if (!name) return false;
      localStorage.setItem('golden_team_tech_auth', name);
      showToast(t('welcome') + ' ' + name);
      setTimeout(() => window.location.href = 'tech.html', 600);
      return false;
    }
  </script>
</body>
</html>
